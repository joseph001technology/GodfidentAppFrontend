name: godfident
description: Personal Bible Study & Spiritual Growth App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.3

  # Routing
  go_router: ^14.2.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Markdown
  flutter_markdown: ^0.7.3

  # Charts
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
